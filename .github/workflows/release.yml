name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/alertblurty.Web/package-lock.json

      - name: Restore
        run: dotnet restore alertblurty.sln

      - name: Install frontend dependencies
        working-directory: src/alertblurty.Web
        run: npm ci

      - name: Build
        run: dotnet build alertblurty.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test alertblurty.sln --configuration Release --no-build

      - name: Test frontend
        working-directory: src/alertblurty.Web
        run: npm test

      - name: Build frontend
        working-directory: src/alertblurty.Web
        run: npm run build

      - name: Publish API
        run: dotnet publish src/alertblurty.Api/alertblurty.Api.csproj --configuration Release --output ./artifacts/api

      - name: Upload API release artifact
        uses: actions/upload-artifact@v4
        with:
          name: alertblurty-api-${{ github.ref_name }}
          path: ./artifacts/api

      - name: Upload web release artifact
        uses: actions/upload-artifact@v4
        with:
          name: alertblurty-web-${{ github.ref_name }}
          path: src/alertblurty.Web/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/api/**
            src/alertblurty.Web/dist/**
