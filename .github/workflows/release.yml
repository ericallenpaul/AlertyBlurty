name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore alertblurty.sln

      - name: Build
        run: dotnet build alertblurty.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test alertblurty.sln --configuration Release --no-build

      - name: Publish API
        run: dotnet publish src/alertblurty.Api/alertblurty.Api.csproj --configuration Release --output ./artifacts/api

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: alertblurty-api-${{ github.ref_name }}
          path: ./artifacts/api

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./artifacts/api/**
