name: CI

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/alertblurty.Web/package-lock.json

      - name: Restore
        run: dotnet restore alertblurty.sln

      - name: Build
        run: dotnet build alertblurty.sln --configuration Release --no-restore

      - name: Lint (dotnet format)
        run: dotnet format alertblurty.sln --verify-no-changes --no-restore

      - name: Test
        run: dotnet test alertblurty.sln --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Install frontend dependencies
        working-directory: src/alertblurty.Web
        run: npm ci

      - name: Lint frontend
        working-directory: src/alertblurty.Web
        run: npm run lint

      - name: Test frontend
        working-directory: src/alertblurty.Web
        run: npm test

      - name: Build frontend
        working-directory: src/alertblurty.Web
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/alertblurty.Web/package-lock.json

      - name: Restore
        run: dotnet restore alertblurty.sln

      - name: Install frontend dependencies
        working-directory: src/alertblurty.Web
        run: npm ci

      - name: Dependency vulnerability scan
        shell: pwsh
        run: |
          $output = dotnet list alertblurty.sln package --vulnerable --include-transitive
          $output
          if ($output -match 'has the following vulnerable packages') {
            throw 'Vulnerable package(s) detected.'
          }

      - name: Frontend dependency audit
        working-directory: src/alertblurty.Web
        run: npm audit --audit-level=high
