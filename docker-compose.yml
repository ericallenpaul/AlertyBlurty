services:
  alertyblurty:
    image: ${ALERTYBLURTY_IMAGE:-ericallenpaul/alertyblurty:latest}
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ALERTYBLURTY_PORT:-18080}:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ALERTYBLURTY_PORT: ${ALERTYBLURTY_PORT:-18080}
      ALERTYBLURTY_CONFIG_PATH: ${ALERTYBLURTY_CONFIG_PATH:-/app/data/appsettings.Local.json}
      CONNECTION_STRING: ${CONNECTION_STRING:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ISSUER: ${JWT_ISSUER:-AlertyBlurty}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-AlertyBlurty}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      BUNDLED_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alertyblurty-bootstrap-change-me}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    volumes:
      - alertyblurty-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alertyblurty}
      POSTGRES_USER: ${POSTGRES_USER:-alerty_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alertyblurty-bootstrap-change-me}
    volumes:
      - alertyblurty-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  alertyblurty-data:
  alertyblurty-postgres-data:
